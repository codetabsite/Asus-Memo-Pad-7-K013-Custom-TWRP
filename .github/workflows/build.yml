name: 🟢 TWRP Matrix - ME176C Build

on:
  push:
    branches: [ main ]
    paths:
      - 'theme/**'
      - 'generate_icons.py'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Temiz derleme (cache temizle)'
        required: false
        default: 'false'
        type: boolean

jobs:
  generate-icons:
    name: 🎨 İkon Üret
    runs-on: ubuntu-22.04

    steps:
      - name: Repo'yu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: İkonları üret
        run: |
          cd $GITHUB_WORKSPACE
          python3 generate_icons.py

      - name: Üretilen ikonları kontrol et
        run: |
          ls -lh theme/images/
          ls theme/images/ | wc -l

      - name: İkonları artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: matrix-theme-icons
          path: theme/
          retention-days: 7

  build-twrp:
    name: 🔨 TWRP Derle
    runs-on: ubuntu-22.04
    needs: generate-icons
    timeout-minutes: 340

    steps:
      - name: Repo'yu al
        uses: actions/checkout@v4

      - name: Disk alanını temizle
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Bağımlılıkları kur
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git-core gnupg flex bison build-essential \
            zip curl zlib1g-dev gcc-multilib g++-multilib \
            libc6-dev-i386 libncurses5 lib32ncurses5-dev \
            x11proto-core-dev libx11-dev lib32z1-dev \
            libgl1-mesa-dev libxml2-utils xsltproc unzip \
            python3 python2 bc libssl-dev \
            rsync lzop ccache schedtool libelf-dev
          sudo ln -sf /usr/bin/python2 /usr/bin/python

      - name: ccache ayarla
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-me176c-twrp-${{ github.sha }}
          restore-keys: |
            ccache-me176c-twrp-
            ccache-me176c-

      - name: ccache başlat
        run: |
          ccache --max-size=5G
          ccache --zero-stats

      - name: repo aracını kur
        run: |
          mkdir -p ~/bin
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Git ayarları
        run: |
          git config --global user.email "twrp-build@github.com"
          git config --global user.name "TWRP Matrix Builder"
          git config --global color.ui false

      - name: LineageOS 16.0 kaynak kodunu başlat
        run: |
          mkdir -p ~/android/twrp
          cd ~/android/twrp
          repo init \
            -u https://github.com/LineageOS/android.git \
            -b lineage-16.0 \
            --depth=1 \
            --no-clone-bundle \
            --groups=all,-notdefault,-device,-mips,-darwin

      - name: ME176C local manifest ekle
        run: |
          mkdir -p ~/android/twrp/.repo/local_manifests
          curl -fsSL \
            "https://raw.githubusercontent.com/me176c-dev/android_device_asus_K013/lineage-16.0/lineage_me176c.xml" \
            -o ~/android/twrp/.repo/local_manifests/lineage_me176c.xml

      - name: Sorunlu firmware reposunu manifest'ten çıkar
        run: |
          sed -i '/firmware\/linux/d' \
            ~/android/twrp/.repo/local_manifests/lineage_me176c.xml

      - name: Kaynak kodunu sync et
        run: |
          cd ~/android/twrp
          repo sync \
            -j4 \
            --no-clone-bundle \
            --no-tags \
            --optimized-fetch \
            --prune \
            --force-sync

      - name: x86 GCC toolchain indir
        run: |
          TOOLCHAIN=~/android/twrp/prebuilts/gcc/linux-x86/x86/x86_64-linux-android-4.9
          if [ -d "$TOOLCHAIN/.git" ]; then
            cd "$TOOLCHAIN"
            git fetch --depth=1
            git checkout FETCH_HEAD
          else
            rm -rf "$TOOLCHAIN"
            git clone \
              --depth=1 \
              https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/x86/x86_64-linux-android-4.9 \
              "$TOOLCHAIN"
          fi

      - name: TWRP fork checkout et
        run: |
          cd ~/android/twrp
          if [ -f "device/asus/K013/setup-twrp.sh" ]; then
            bash device/asus/K013/setup-twrp.sh
          elif [ ! -d "bootable/recovery/.git" ]; then
            git clone \
              --depth=1 \
              https://github.com/me176c-dev/android_bootable_recovery_twrp.git \
              bootable/recovery
          fi

      - name: Üretilen ikonları indir
        uses: actions/download-artifact@v4
        with:
          name: matrix-theme-icons
          path: /tmp/matrix-theme

      - name: Matrix temasını kaynak koda uygula
        run: |
          for dir in $(find ~/android/twrp/bootable/recovery/gui/theme -maxdepth 1 -type d); do
            if [ -f "$dir/ui.xml" ]; then
              cp /tmp/matrix-theme/ui.xml "$dir/ui.xml"
              if [ -d "$dir/images" ] || [ -d "$dir/res" ]; then
                TARGET=$(ls -d "$dir/images" "$dir/res" 2>/dev/null | head -1)
                cp /tmp/matrix-theme/images/*.png "$TARGET/" 2>/dev/null || true
              fi
            fi
          done

      - name: Patch uygula
        run: |
          cd ~/android/twrp

          find hardware/me176c -name "Android.bp" -exec \
            sed -i '/recovery_available/d' {} \;

          KARCH_MK="kernel/me176c/arch/x86/boot/compressed/Makefile"
          if [ -f "$KARCH_MK" ]; then
            sed -i 's/-pie//' "$KARCH_MK" || true
          fi

          KCONFIG="kernel/me176c/arch/x86/configs/me176c_defconfig"
          if [ -f "$KCONFIG" ]; then
            sed -i '/CONFIG_RANDOMIZE_BASE/d' "$KCONFIG"
            echo "# CONFIG_RANDOMIZE_BASE is not set" >> "$KCONFIG"
          fi

          if [ -f "device/asus/K013/patches/apply.sh" ]; then
            bash device/asus/K013/patches/apply.sh aosp || true
          fi

      - name: TWRP derle
        run: |
          cd ~/android/twrp
          export USE_CCACHE=1
          export CCACHE_DIR=~/.ccache
          export CCACHE_EXEC=$(which ccache)
          export ADDITIONAL_KERNEL_FLAGS="KASLR_OFFSET=0"
          export TARGET_KERNEL_CLANG_COMPILE=false
          source build/envsetup.sh
          lunch twrp_K013-eng || lunch lineage_me176c-userdebug
          make recoveryimage -j$(nproc) KASLR_OFFSET=0 KBUILD_LDFLAGS_MODULE="" 2>&1 | tee /tmp/build.log
          find out/target/product -name "recovery.img" -exec ls -lh {} \;

      - name: ccache istatistikleri
        if: always()
        run: ccache --show-stats

      - name: Build logunu yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 3

      - name: Recovery image'i bul ve kopyala
        run: |
          RECOVERY=$(find ~/android/twrp/out/target/product -name "recovery.img" | head -1)
          if [ -z "$RECOVERY" ]; then
            echo "❌ recovery.img bulunamadı!"
            exit 1
          fi
          cp "$RECOVERY" ~/twrp-matrix-me176c.img
          ls -lh ~/twrp-matrix-me176c.img

      - name: Recovery image'i artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: twrp-matrix-me176c
          path: ~/twrp-matrix-me176c.img
          retention-days: 30

      - name: Build özeti
        if: success()
        run: |
          echo "## ✅ TWRP Matrix - ME176C Build Başarılı!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Özellik | Değer |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Cihaz | ASUS MeMO Pad 7 ME176C (K013) |" >> $GITHUB_STEP_SUMMARY
          echo "| Tema | Matrix Green |" >> $GITHUB_STEP_SUMMARY
          echo "| TWRP versiyonu | 3.3.1 Unofficial |" >> $GITHUB_STEP_SUMMARY
          echo "| Çözünürlük | 800x1280 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact:** twrp-matrix-me176c (recovery.img)" >> $GITHUB_STEP_SUMMARY
